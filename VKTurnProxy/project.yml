name: VKTurnProxy
options:
  bundleIdPrefix: com.vkturnproxy
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "16.2"

settings:
  base:
    DEVELOPMENT_TEAM: CDMQ33VFQC
    CODE_SIGN_STYLE: Automatic

targets:
  VKTurnProxy:
    type: application
    platform: iOS
    sources:
      - path: VKTurnProxy
    # Switched from GENERATE_INFOPLIST_FILE: YES to an explicit
    # info.properties block in xcodegen. Reason: CFBundleURLTypes (an
    # array-of-dicts for the vkturnproxy:// 1-Click import scheme) has
    # no INFOPLIST_KEY_* equivalent — Apple's flat KEY_VALUE form only
    # covers scalars. The translations from the old INFOPLIST_KEY_*
    # entries to native plist values are 1:1 below; CFBundleVersion /
    # CFBundleShortVersionString are interpolated explicitly via
    # $(...) so they still track CURRENT_PROJECT_VERSION / MARKETING_VERSION
    # in build settings below.
    info:
      path: VKTurnProxy/Info.plist
      properties:
        CFBundleDisplayName: "VK Turn Proxy"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        # Declare that we don't use non-exempt encryption — only standard
        # crypto exposed through Apple system APIs (CommonCrypto,
        # Security.framework, Network.framework DTLS/TLS), all exempt
        # under U.S. export Category 5 Part 2. Without this, App Store
        # Connect blocks every TestFlight build with "Encryption export
        # compliance documentation needed" + a France-specific prompt.
        # Was lost in an earlier xcodegen regenerate; pinned here now.
        ITSAppUsesNonExemptEncryption: false
        # UIApplicationSceneManifest_Generation: YES used to produce a
        # dict with UIApplicationSupportsMultipleScenes=false; same
        # shape written explicitly below.
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIApplicationSupportsIndirectInputEvents: true
        # UILaunchScreen_Generation: YES used to produce an empty dict
        # (iOS shows a blank launch screen with the default tint); empty
        # mapping below has the same effect.
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # 1-Click Connection Link import. Tapping a
        # vkturnproxy://import?data=<base64> URL anywhere on iOS
        # launches us and delivers the URL via .onOpenURL in
        # SettingsView. The base64 payload is a JSON ConnectionLink
        # (see AppConfig.swift + BackupManager.parseConnectionLink).
        # Generator script: quick_link.py at repo root.
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLName: com.vkturnproxy.app
            CFBundleURLSchemes:
              - vkturnproxy
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vkturnproxy.app
        CODE_SIGN_ENTITLEMENTS: VKTurnProxy/VKTurnProxy.entitlements
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: 122
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Pre-bootstrap captcha probe in connect() calls Go-side
        # wgProbeVKCreds directly from main-app process (the only context
        # where we can show a WebView while still having network — see
        # TunnelManager.swift). That requires the same xcframework +
        # bridging header that the extension target uses.
        SWIFT_OBJC_BRIDGING_HEADER: VKTurnProxy/BridgeHeader.h
        OTHER_LDFLAGS:
          - "-lresolv"
        FRAMEWORK_SEARCH_PATHS:
          - "$(inherited)"
          - "$(PROJECT_DIR)/../WireGuardBridge/build"
    dependencies:
      - target: PacketTunnel
        embed: true
      - sdk: NetworkExtension.framework
      # Main-app links against the xcframework (calls wgProbeVKCreds for
      # the pre-bootstrap captcha probe) but must NOT embed it: the
      # underlying file is a static archive (libwg-turn-ios-arm64.a), and
      # App Store Connect rejects archives in Frameworks/ with
      # ITMS-90432/ITMS-90171. The PacketTunnel extension already embeds
      # the xcframework into its own bundle for runtime; the main app
      # just links the symbols at build time.
      - framework: ../WireGuardBridge/build/WireGuardTURN.xcframework
        embed: false

  PacketTunnel:
    type: app-extension
    platform: iOS
    sources:
      - path: PacketTunnel
      # SharedLogger.swift lives under VKTurnProxy/ but is compiled into
      # both targets — main-app and extension write to the same App Group
      # log file via this helper.
      - path: VKTurnProxy/SharedLogger.swift
      # OSLogReader.swift is the in-process os_log fallback. Compiled
      # into the extension so handleAppMessage("get_logs") can read its
      # own ring buffer and return entries to the main app — used as a
      # fallback when the App Group container is unavailable and
      # SharedLogger silently no-ops.
      - path: VKTurnProxy/OSLogReader.swift
    info:
      path: PacketTunnel/Info.plist
      properties:
        CFBundleDisplayName: "VK Turn Proxy Tunnel"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.networkextension.packet-tunnel
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).PacketTunnelProvider
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vkturnproxy.app.tunnel
        CODE_SIGN_ENTITLEMENTS: PacketTunnel/PacketTunnel.entitlements
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: 122
        SKIP_INSTALL: YES
        SWIFT_OBJC_BRIDGING_HEADER: PacketTunnel/BridgeHeader.h
        OTHER_LDFLAGS:
          - "-lresolv"
        FRAMEWORK_SEARCH_PATHS:
          - "$(inherited)"
          - "$(PROJECT_DIR)/../WireGuardBridge/build"
    dependencies:
      - framework: ../WireGuardBridge/build/WireGuardTURN.xcframework
      - sdk: NetworkExtension.framework
